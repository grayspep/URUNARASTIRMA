<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>XCOMMERCE — Rakip Mağaza</title>
<link rel="stylesheet" href="/main.css"/>
</head>
<body>
<button class="hamburger" id="ham">☰</button>
<div class="app">
  <div id="nav-root"></div>
  <main class="main" id="root"></main>
</div>

<script src="/nav.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const user = requireAuth();
if (user) {
  renderSidebar();
  const {useState,useEffect,useRef} = React, h = React.createElement;

  const NISLER=["Hobi","Sağlık","Bebek & Anne","Mutfak","Güzellik","Kadın","Araba & Motor","Ev & Dekor","Spor","Teknoloji","Evcil Hayvan"];
  const TIPLER=["Sorun Çözen","Wow Ürün + Hediyelik"];
  const DURUM_O=["Araştırılıyor","Test Aşamasında","Onaylandı","Reddedildi"];

  /* ── YARDIMCI ── */
  function fmtNum(n){if(!n&&n!==0)return"—";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n.toLocaleString("tr-TR");}
  function fmtTime(s){if(!s)return"—";const m=Math.floor(s/60);const sec=Math.floor(s%60);return m+"d "+sec+"s";}
  function fmtPct(v){if(v==null)return"—";return(v*100).toFixed(1)+"%";}
  function countryFlag(code){if(!code||code.length!==2)return"🌍";try{return [...code.toUpperCase()].map(c=>String.fromCodePoint(0x1F1E6+c.charCodeAt(0)-65)).join("");}catch{return"🌍";}}

  /* ── SİMİLARWEB PANELİ ── */
  function SimilarWebPanel({domain}){
    const [data,setData]=useState(null);
    const [loading,setLoading]=useState(false);
    const [error,setError]=useState("");

    async function fetch_(force){
      setLoading(true);setError("");
      if(force) await api.del(`/api/similarweb/${encodeURIComponent(domain)}`);
      const r=await api.get(`/api/similarweb/${encodeURIComponent(domain)}`);
      if(r.error)setError(r.error);
      else setData(r);
      setLoading(false);
    }

    if(!data&&!loading&&!error) return h("div",{className:"sw-fetch-area"},
      h("button",{className:"btn btn-p",onClick:()=>fetch_(false)},"📊 SimilarWeb Analizi Getir"),
      h("div",{className:"sw-fetch-hint"},"⚡ 4 API çağrısı kullanır · "+domain+" için önbellekte veri varsa ücretsiz")
    );

    if(loading) return h("div",{className:"sw-loading"},h("div",{className:"ai-spinner"}),h("span",null,"SimilarWeb verisi çekiliyor..."));
    if(error&&!data) return h("div",{className:"sw-panel"},h("div",{className:"sw-err"},"⚠ "+error),h("button",{className:"btn btn-g btn-s",style:{marginTop:10},onClick:()=>fetch_(false)},"Tekrar Dene"));

    const t=data.traffic,rk=data.rank,sim=data.similar,cnt=data.country;

    /* Ziyaret verileri — en eskiden yeniye sırala */
    const visits=t?.Visits?Object.entries(t.Visits).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>({
      lbl:new Date(k).toLocaleDateString("tr-TR",{month:"short",year:"2-digit"}),v
    })):[];
    const maxVisit=visits.length?Math.max(...visits.map(x=>x.v)):1;

    /* Trafik kaynakları */
    const sources=t?.Sources?[
      {lbl:"Organik Arama",val:t.Sources.Search||0,color:"var(--acc)"},
      {lbl:"Direkt",val:t.Sources.Direct||0,color:"var(--grn)"},
      {lbl:"Referral",val:t.Sources.Referrals||0,color:"var(--pur)"},
      {lbl:"Sosyal Medya",val:t.Sources.Social||0,color:"var(--amb)"},
      {lbl:"Mail",val:t.Sources.Mail||0,color:"var(--cyn)"},
      {lbl:"Ücretli",val:t.Sources.PaidReferrals||0,color:"var(--red)"},
    ].filter(x=>x.val>0).sort((a,b)=>b.val-a.val):[];

    /* Ülke dağılımı */
    const countries=t?.TopCountryShares?Object.entries(t.TopCountryShares).sort((a,b)=>b[1]-a[1]).slice(0,7):[];

    /* Benzer siteler */
    const similarSites=sim?.SimilarSites||sim?.similar_sites||
      (Array.isArray(sim)?sim:[]);

    /* Global rank */
    const globalRank=rk?.GlobalRank||rk?.global_rank||rk?.Rank||null;
    const countryRanks=rk?.CountryRank||(Array.isArray(rk?.CountryRanks)?rk.CountryRanks:null);

    return h("div",{className:"sw-panel"},
      /* Header */
      h("div",{className:"sw-header"},
        h("div",{className:"sw-title"},"📊 SimilarWeb — "+domain),
        h("div",{className:"sw-meta"},
          data.cached&&h("span",null,"🗄 Önbellekten"),
          h("span",null,"🕐 "+ago(data.guncelleme)),
          h("button",{className:"btn btn-g btn-s",onClick:()=>fetch_(true)},"⟳ Yenile (4 API)")
        )
      ),

      /* Üst 3 kart */
      h("div",{className:"sw-grid3"},

        /* Aylık Ziyaretçi */
        h("div",{className:"sw-card"},
          h("div",{className:"sw-card-title"},"📈 Aylık Ziyaretçi"),
          visits.length>0?h("div",null,
            h("div",{className:"sw-visits-chart"},
              ...visits.map((v,i)=>h("div",{key:i,className:"sw-visit-bar-wrap"},
                h("div",{className:"sw-visit-val"},fmtNum(v.v)),
                h("div",{className:"sw-visit-bar",style:{height:Math.max(8,Math.round((v.v/maxVisit)*68))+"px"}}),
                h("div",{className:"sw-visit-lbl"},v.lbl)
              ))
            )
          ):h("div",{style:{color:"var(--t3)",fontSize:13}},"Veri yok")
        ),

        /* Engagement */
        h("div",{className:"sw-card"},
          h("div",{className:"sw-card-title"},"💡 Engagement"),
          t?.Engagement&&h("div",null,
            h("div",{className:"sw-metric"},h("span",{className:"sw-metric-lbl"},"Bounce Rate"),h("span",{className:"sw-metric-val",style:{color:t.Engagement.BounceRate>.6?"var(--red)":"var(--grn)"}},fmtPct(t.Engagement.BounceRate))),
            h("div",{className:"sw-metric"},h("span",{className:"sw-metric-lbl"},"Site Süresi"),h("span",{className:"sw-metric-val"},fmtTime(t.Engagement.TimeOnSite))),
            h("div",{className:"sw-metric"},h("span",{className:"sw-metric-lbl"},"Sayfa/Ziyaret"),h("span",{className:"sw-metric-val"},t.Engagement.PagesPerVisit?.toFixed(1)||"—"))
          )
        ),

        /* Rank */
        h("div",{className:"sw-card"},
          h("div",{className:"sw-card-title"},"🏆 Sıralama"),
          globalRank&&h("div",{className:"sw-rank-item"},
            h("div",{className:"sw-rank-big"},"#"+fmtNum(globalRank)),
            h("div",{className:"sw-rank-lbl"},"Global Sıralama")
          ),
          countryRanks&&h("div",{style:{marginTop:10}},
            Array.isArray(countryRanks)
              ?countryRanks.slice(0,3).map((cr,i)=>h("div",{key:i,className:"sw-metric"},
                  h("span",{className:"sw-metric-lbl"},countryFlag(cr.Country||cr.country)+" "+(cr.Country||cr.country)),
                  h("span",{className:"sw-metric-val"},"#"+fmtNum(cr.Rank||cr.rank))
                ))
              :h("div",{className:"sw-metric"},
                  h("span",{className:"sw-metric-lbl"},countryFlag(countryRanks.Country)+" "+countryRanks.Country),
                  h("span",{className:"sw-metric-val"},"#"+fmtNum(countryRanks.Rank))
                )
          ),
          !globalRank&&!countryRanks&&h("div",{style:{color:"var(--t3)",fontSize:13}},"Veri yok")
        )
      ),

      h("hr",{className:"sw-divider"}),

      /* Trafik Kaynakları */
      sources.length>0&&h("div",{className:"sw-section"},
        h("div",{className:"sw-section-title"},"🔀 Trafik Kaynakları"),
        ...sources.map((s,i)=>h("div",{key:i,className:"sw-bar-row"},
          h("div",{className:"sw-bar-lbl"},s.lbl),
          h("div",{className:"sw-bar-track"},h("div",{className:"sw-bar-fill",style:{width:fmtPct(s.val),background:s.color}})),
          h("div",{className:"sw-bar-pct"},fmtPct(s.val))
        ))
      ),

      /* Ülke Dağılımı */
      countries.length>0&&h("div",{className:"sw-section"},
        h("div",{className:"sw-section-title"},"🌍 Ülke Dağılımı"),
        ...countries.map(([code,share],i)=>h("div",{key:i,className:"sw-bar-row"},
          h("div",{className:"sw-bar-lbl"},countryFlag(code)+" "+code),
          h("div",{className:"sw-bar-track"},h("div",{className:"sw-bar-fill",style:{width:fmtPct(share),background:"var(--pur)"}})),
          h("div",{className:"sw-bar-pct"},fmtPct(share))
        ))
      ),

      /* Benzer Siteler */
      similarSites.length>0&&h("div",{className:"sw-section"},
        h("div",{className:"sw-section-title"},"🔗 Benzer Siteler"),
        h("div",{className:"sw-similar-chips"},
          ...similarSites.slice(0,12).map((s,i)=>{
            const domain2=s?.Domain||s?.domain||s||"";
            return h("a",{key:i,href:"https://"+domain2,target:"_blank",rel:"noreferrer",className:"sw-similar-chip"},domain2);
          })
        )
      )
    );
  }

  // Quick-add modal for adding a Shopify product to our list
  function QuickAddModal({urun, siteUrl, onClose, onSave}){
    const [f,setF]=useState({
      urun: urun.title||"",
      link: "",
      tedarik_link: `https://${siteUrl}/products/${urun.handle}`,
      gorsel: urun.gorsel_url||"",
      nis: "",tip: "",durum: "Araştırılıyor",kaynak: "Diğer",
      fomo: "",rakip: "",kreatif: "",breakeven: "",
      fiyat: "",para_birimi: "USD",
      satis_fiyat: urun.fiyat||"",
      alis_fiyat: "",notlar: `Kaynak: ${siteUrl}\nVendor: ${urun.vendor||"—"}\nTip: ${urun.product_type||"—"}`,
      rakip_magazalar:[]
    });
    const s=k=>v=>setF(p=>({...p,[k]:v}));
    async function submit(){
      await onSave({...f,kullanici_id:user.id});
      showToast("Listeye eklendi ✓");
      onClose();
    }
    return h("div",{className:"ov",onClick:e=>{if(e.target===e.currentTarget)onClose()}},
      h("div",{className:"modal",style:{maxWidth:520}},
        h("div",{className:"mhdr"},
          h("span",{className:"mtit"},"Listeye Ekle"),
          h("button",{className:"xbtn",onClick:onClose},"×")
        ),
        h("div",{className:"mbdy"},
          urun.gorsel_url&&h("div",{style:{width:80,height:80,borderRadius:8,overflow:"hidden",marginBottom:12,border:"1px solid var(--b1)"}},
            h("img",{src:urun.gorsel_url,alt:"",style:{width:"100%",height:"100%",objectFit:"cover"}})
          ),
          h("div",{className:"fgrid"},
            h("div",{className:"fg full"},h("label",null,"Ürün Adı"),h("input",{className:"fc",value:f.urun,onChange:e=>s("urun")(e.target.value)})),
            h("div",{className:"fg"},h("label",null,"Niş"),h("select",{className:"fc",value:f.nis,onChange:e=>s("nis")(e.target.value)},h("option",{value:""},"Seç..."),...NISLER.map(o=>h("option",{key:o,value:o},o)))),
            h("div",{className:"fg"},h("label",null,"Durum"),h("select",{className:"fc",value:f.durum,onChange:e=>s("durum")(e.target.value)},...DURUM_O.map(o=>h("option",{key:o,value:o},o)))),
            h("div",{className:"fg"},h("label",null,"Satış Fiyatı"),h("div",{style:{display:"flex",gap:6}},
              h("select",{className:"fc",style:{width:80},value:f.para_birimi,onChange:e=>s("para_birimi")(e.target.value)},["USD","EUR","TRY"].map(o=>h("option",{key:o,value:o},o))),
              h("input",{className:"fc",type:"number",value:f.satis_fiyat,onChange:e=>s("satis_fiyat")(e.target.value),placeholder:"0.00"})
            )),
            h("div",{className:"fg"},h("label",null,"Tedarikçi Linki"),h("input",{className:"fc",value:f.tedarik_link,onChange:e=>s("tedarik_link")(e.target.value)})),
            h("div",{className:"fg full"},h("label",null,"Notlar"),h("textarea",{className:"fc",value:f.notlar,onChange:e=>s("notlar")(e.target.value),rows:3}))
          )
        ),
        h("div",{className:"mfoot"},
          h("button",{className:"btn btn-g",onClick:onClose},"İptal"),
          h("button",{className:"btn btn-p",onClick:submit},"+ Listeye Ekle")
        )
      )
    );
  }

  function UrunCard({urun, siteUrl, onAddClick}){
    const fiyatNum=parseFloat(urun.fiyat);
    const compareNum=parseFloat(urun.compare_fiyat);
    const hasDiscount=compareNum&&compareNum>fiyatNum;
    const tags=(urun.tags||"").split(",").map(t=>t.trim()).filter(Boolean).slice(0,3);
    return h("div",{className:"urun-card"},
      h("div",{className:"urun-img"},
        urun.gorsel_url
          ?h("img",{src:urun.gorsel_url,alt:urun.title,loading:"lazy",onError:e=>{e.target.parentElement.innerHTML='<div class="urun-no-img">📦</div>'}})
          :h("div",{className:"urun-no-img"},"📦")
      ),
      h("div",{className:"urun-body"},
        h("div",{className:"urun-title"},urun.title),
        h("div",{className:"urun-price"},
          h("span",{className:"urun-price-main"},fiyatNum?"€"+fiyatNum.toFixed(2):"—"),
          hasDiscount&&h("span",{className:"urun-price-compare"},"€"+compareNum.toFixed(2))
        ),
        h("div",{className:"urun-meta"},
          urun.vendor&&h("span",null,"🏷 "+urun.vendor),
          urun.product_type&&h("span",null,"📂 "+urun.product_type),
          h("span",{className:urun.available?"avail-yes":"avail-no"},urun.available?"✓ Stokta":"✗ Tükendi"),
          h("span",null,"➕ "+fmtDate(urun.created_at)),
          h("span",null,"🔄 "+fmtDate(urun.updated_at))
        ),
        tags.length>0&&h("div",{className:"urun-tags"},...tags.map(t=>h("span",{key:t,className:"urun-tag"},t))),
        h("button",{className:"urun-add-btn",onClick:()=>onAddClick(urun,siteUrl)},"+ Araştırma Listesine Ekle")
      )
    );
  }

  function SiteCard({site, onDelete, onRefresh, onAddClick}){
    const [open,setOpen]=useState(false);
    const [tab,setTab]=useState("urunler");
    const [refreshing,setRefreshing]=useState(false);
    const [search,setSearch]=useState("");
    const urunler=site.urunler||[];
    const filtered=search?urunler.filter(u=>(u.title||"").toLowerCase().includes(search.toLowerCase())||(u.vendor||"").toLowerCase().includes(search.toLowerCase())||(u.product_type||"").toLowerCase().includes(search.toLowerCase())):urunler;

    async function doRefresh(e){
      e.stopPropagation();
      setRefreshing(true);
      const r=await api.post("/api/rakip-magazalar/ara",{url:site.url});
      if(r.error)showToast("⚠ "+r.error,"error");
      else{showToast("Yenilendi ✓");onRefresh();}
      setRefreshing(false);
    }

    const fav=`https://www.google.com/s2/favicons?domain=${site.url}&sz=64`;

    return h("div",{className:"site-card"},
      /* Site başlık satırı */
      h("div",{className:"site-header",onClick:()=>setOpen(p=>!p)},
        h("div",{className:"site-fav"},h("img",{src:fav,alt:"",onError:e=>{e.target.src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='10' fill='%23252a35'/%3E%3C/svg%3E"}})),
        h("div",{className:"site-info"},
          h("div",{className:"site-url"},site.url),
          h("div",{className:"site-meta"},
            h("span",null,"📦 "+site.urun_sayisi+" ürün"),
            site.son_cekme&&h("span",null,"🕐 "+ago(site.son_cekme))
          )
        ),
        h("div",{className:"site-actions"},
          h("button",{className:"btn btn-g btn-s",onClick:doRefresh,disabled:refreshing},refreshing?h("span",{className:"spin"},"⟳"):"⟳ Yenile"),
          h("button",{className:"btn btn-d btn-s",onClick:e=>{e.stopPropagation();if(confirm(site.url+" silinsin mi?"))onDelete(site.id)}},"✕"),
          h("button",{className:"site-expand-btn"+(open?" open":""),onClick:e=>{e.stopPropagation();setOpen(p=>!p)}},"▾")
        )
      ),

      /* Açılınca: Tab bar + içerik */
      open&&h("div",null,
        h("div",{className:"tab-bar"},
          h("button",{className:"tab-btn"+(tab==="urunler"?" on":""),onClick:()=>setTab("urunler")},"📦 Ürünler ("+urunler.length+")"),
          h("button",{className:"tab-btn"+(tab==="sw"?" on":""),onClick:()=>setTab("sw")},"📊 SimilarWeb")
        ),

        /* Ürünler tab */
        tab==="urunler"&&h("div",null,
          urunler.length>0&&h("div",{style:{padding:"12px 20px",display:"flex",gap:8,alignItems:"center"}},
            h("div",{style:{position:"relative",flex:1}},
              h("span",{style:{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"var(--t3)",pointerEvents:"none"}},"🔍"),
              h("input",{style:{width:"100%",background:"var(--bg3)",border:"1px solid var(--b1)",borderRadius:"var(--r)",padding:"8px 12px 8px 32px",color:"var(--t1)",fontSize:13,fontFamily:"inherit"},placeholder:`${urunler.length} ürün içinde ara...`,value:search,onChange:e=>setSearch(e.target.value)})
            ),
            h("span",{style:{fontSize:12,color:"var(--t3)",whiteSpace:"nowrap"}},filtered.length+" sonuç")
          ),
          filtered.length===0
            ?h("div",{style:{textAlign:"center",padding:"2rem",color:"var(--t3)",fontSize:13}},search?"Sonuç bulunamadı":"Bu sitede ürün yok")
            :h("div",{className:"urun-grid",style:{padding:"0 20px 20px"}},...filtered.map(u=>h(UrunCard,{key:u.id,urun:u,siteUrl:site.url,onAddClick})))
        ),

        /* SimilarWeb tab */
        tab==="sw"&&h(SimilarWebPanel,{domain:site.url})
      )
    );
  }

  function App(){
    const [siteler,setSiteler]=useState([]);
    const [loading,setLoading]=useState(true);
    const [fetching,setFetching]=useState(false);
    const [url,setUrl]=useState("");
    const [error,setError]=useState("");
    const [quickAdd,setQuickAdd]=useState(null); // {urun, siteUrl}
    const inputRef=useRef();

    async function load(){
      setLoading(true);
      setSiteler(await api.get("/api/rakip-magazalar"));
      setLoading(false);
    }
    useEffect(()=>{load();},[]);

    async function ara(){
      const u=url.trim();
      if(!u){setError("URL gir");return;}
      setFetching(true);setError("");
      const r=await api.post("/api/rakip-magazalar/ara",{url:u});
      if(r.error){setError(r.error);}
      else{setUrl("");showToast(`${r.url} — ${r.urun_sayisi} ürün çekildi ✓`);await load();}
      setFetching(false);
    }

    async function delSite(id){
      await api.del(`/api/rakip-magazalar/${id}`);
      showToast("Silindi");
      setSiteler(siteler.filter(s=>s.id!==id));
    }

    function handleAddClick(urun, siteUrl){ setQuickAdd({urun, siteUrl}); }

    const totalUrunler=siteler.reduce((s,x)=>s+(x.urun_sayisi||0),0);

    return h("div",null,
      h("div",{className:"ph"},
        h("div",null,
          h("div",{className:"ptit"},"🕵️ Rakip Mağaza Analizi"),
          h("div",{className:"psub"},"Shopify mağazalarını analiz et, ürünleri keşfet")
        )
      ),

      siteler.length>0&&h("div",{className:"sg",style:{gridTemplateColumns:"repeat(3,1fr)"}},
        h("div",{className:"sc"},h("div",{className:"slbl"},"Takip Edilen"),h("div",{className:"sval"},siteler.length),h("div",{className:"ssub"},"mağaza")),
        h("div",{className:"sc ac"},h("div",{className:"slbl"},"Toplam Ürün"),h("div",{className:"sval"},totalUrunler),h("div",{className:"ssub"},"keşfedildi")),
        h("div",{className:"sc gr"},h("div",{className:"slbl"},"Son Güncelleme"),h("div",{className:"sval",style:{fontSize:18}},siteler[0]?ago(siteler[0].son_cekme):"—"),h("div",{className:"ssub"},"en son çekim"))
      ),

      h("div",{style:{marginBottom:"1.5rem"}},
        h("div",{className:"rak-search"},
          h("span",{className:"rak-input-icon"},"🌐"),
          h("input",{ref:inputRef,className:"rak-input",placeholder:"velskn.com veya https://example.myshopify.com",value:url,onChange:e=>{setUrl(e.target.value);setError("");},onKeyDown:e=>{if(e.key==="Enter")ara();}}),
          h("button",{className:"rak-btn",onClick:ara,disabled:fetching},fetching?h("span",{className:"spin"},"⟳ Çekiliyor..."):"🔍 Analiz Et")
        ),
        error&&h("div",{style:{color:"var(--red)",fontSize:"var(--fs-sm)",background:"var(--red-b)",borderRadius:"var(--r)",padding:"10px 14px",marginTop:8}},"⚠ "+error),
        h("div",{style:{fontSize:12,color:"var(--t3)",marginTop:8}},"Shopify kullanan herhangi bir mağazanın URL'sini gir (örn: velskn.com, gymshark.com)")
      ),

      loading?h("div",{style:{textAlign:"center",padding:"4rem",color:"var(--t3)"}},"Yükleniyor..."):
      siteler.length===0?h("div",{className:"empty"},
        h("div",{className:"empty-ico"},"🕵️"),
        h("h3",null,"Henüz analiz yapılmadı"),
        h("p",null,"Yukarıya bir Shopify mağaza URL'si gir ve Analiz Et'e bas")
      ):
      h("div",null,...siteler.map(s=>h(SiteCard,{key:s.id,site:s,onDelete:delSite,onRefresh:load,onAddClick:handleAddClick}))),

      // Modal App seviyesinde — transform sorununu çözer
      quickAdd&&h(QuickAddModal,{
        urun:quickAdd.urun,
        siteUrl:quickAdd.siteUrl,
        onClose:()=>setQuickAdd(null),
        onSave:async f=>{await api.post("/api/urunler",f);setQuickAdd(null);}
      })
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
}
</script>
</body>
</html>
