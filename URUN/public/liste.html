<script src="/nav.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const user = requireAuth();
if (user) {
  renderSidebar();
  const {useState,useEffect,useRef} = React, h = React.createElement;
  const NISLER=["Hobi","Sağlık","Bebek & Anne","Mutfak","Güzellik","Kadın","Araba & Motor","Ev & Dekor","Spor","Teknoloji","Evcil Hayvan"];
  const TIPLER=["Sorun Çözen","Wow Ürün + Hediyelik"];
  const FOMO_O=["Evet","Hayır","Bilinmiyor"];
  const RAKIP_O=["1 Aydan Kısa","3 Aydan Kısa","6 Aydan Uzun"];
  const KREATIF_O=["Video ve Görsel Kreatif Var","Sadece Görsel Kreatif Var"];
  const BE_O=["Evet","Hayır","Bilinmiyor"];
  const FIYAT_O=["1200'den Az","2000'den Az","2000'den Fazla","3750'den Fazla"];
  const DURUM_O=["Araştırılıyor","Test Aşamasında","Onaylandı","Reddedildi"];
  const KAYNAK_O=["AliExpress","CJDropshipping","Zendrop","Spocket","Alibaba","Diğer"];
  const PARA_O=["USD","EUR","TRY"];
  const DURUM_CLR={"Araştırılıyor":"var(--amb)","Test Aşamasında":"var(--acc)","Onaylandı":"var(--grn)","Reddedildi":"var(--red)"};
  const ULKELER=[{kod:"TR",ad:"Türkiye",flag:"🇹🇷"},{kod:"CH",ad:"İsviçre",flag:"🇨🇭"},{kod:"PL",ad:"Polonya",flag:"🇵🇱"},{kod:"DE",ad:"Almanya",flag:"🇩🇪"},{kod:"FR",ad:"Fransa",flag:"🇫🇷"},{kod:"GB",ad:"İngiltere",flag:"🇬🇧"},{kod:"US",ad:"Amerika",flag:"🇺🇸"},{kod:"AU",ad:"Avustralya",flag:"🇦🇺"},{kod:"NL",ad:"Hollanda",flag:"🇳🇱"},{kod:"BE",ad:"Belçika",flag:"🇧🇪"},{kod:"AT",ad:"Avusturya",flag:"🇦🇹"},{kod:"SE",ad:"İsveç",flag:"🇸🇪"},{kod:"ES",ad:"İspanya",flag:"🇪🇸"},{kod:"IT",ad:"İtalya",flag:"🇮🇹"},{kod:"AE",ad:"BAE",flag:"🇦🇪"}];
  const E0={urun:"",link:"",tedarik_link:"",gorsel:"",nis:"",tip:"",durum:"Araştırılıyor",kaynak:"",fomo:"",rakip:"",kreatif:"",breakeven:"",fiyat:"",para_birimi:"USD",satis_fiyat:"",alis_fiyat:"",notlar:"",rakip_magazalar:[]};

  function calcScore(u){let s=0;if(u.fomo==="Evet")s+=25;if(u.breakeven==="Evet")s+=25;if(u.kreatif==="Video ve Görsel Kreatif Var")s+=20;if(u.rakip==="1 Aydan Kısa")s+=30;else if(u.rakip==="3 Aydan Kısa")s+=15;return s;}
  function scoreClr(s){return s>=70?"var(--grn)":s>=40?"var(--amb)":"var(--red)";}
  function getFav(url){try{return`https://www.google.com/s2/favicons?domain=${new URL(url.startsWith("http")?url:"https://"+url).hostname}&sz=32`}catch{return null}}
  function getDom(url){try{return new URL(url.startsWith("http")?url:"https://"+url).hostname.replace("www.","")}catch{return url}}

  function bdg(val,sm){
    if(!val)return h("span",{style:{color:"var(--t3)",fontSize:12}},"—");
    const g=["Evet","1 Aydan Kısa","3 Aydan Kısa","Video ve Görsel Kreatif Var","2000'den Fazla","3750'den Fazla","Sorun Çözen","Onaylandı"];
    const r=["6 Aydan Uzun","Hayır","1200'den Az","Reddedildi"];
    const a=["Bilinmiyor","Sadece Görsel Kreatif Var","2000'den Az","Araştırılıyor"];
    const p=["Wow Ürün + Hediyelik"];const c=["Test Aşamasında"];
    const cls=g.includes(val)?"bg":r.includes(val)?"br":a.includes(val)?"ba":p.includes(val)?"bp":c.includes(val)?"bc":"bn";
    return h("span",{className:"bdg "+cls,style:sm?{fontSize:11,padding:"2px 6px"}:{}},val);
  }

  function RakipEditor({value,onChange}){
    const list=Array.isArray(value)?value:[];
    const add=()=>onChange([...list,{url:"",ulkeler:[],notlar:""}]);
    const rem=i=>onChange(list.filter((_,j)=>j!==i));
    const upd=(i,k,v)=>onChange(list.map((x,j)=>j===i?{...x,[k]:v}:x));
    const tog=(i,kod)=>{const c=list[i].ulkeler||[];upd(i,"ulkeler",c.includes(kod)?c.filter(u=>u!==kod):[...c,kod]);};
    return h("div",null,
      h("div",{className:"rm-list"},...list.map((rm,i)=>h("div",{key:i,className:"rm-item"},
        h("div",{className:"rm-row1"},h("input",{className:"fc",value:rm.url||"",onChange:e=>upd(i,"url",e.target.value),placeholder:"skinlove.com"}),h("button",{className:"btn btn-d btn-s",onClick:()=>rem(i)},"✕")),
        h("div",{style:{fontSize:11,color:"var(--t3)",marginBottom:6,fontWeight:700,textTransform:"uppercase"}},"Hedef Pazarlar"),
        h("div",{className:"rm-flags"},...ULKELER.map(u=>h("label",{key:u.kod,className:"rm-flag-cb"+((rm.ulkeler||[]).includes(u.kod)?" sel":"")},h("input",{type:"checkbox",checked:(rm.ulkeler||[]).includes(u.kod),onChange:()=>tog(i,u.kod)}),u.flag," ",u.ad))),
        h("input",{className:"fc",style:{marginTop:8,fontSize:12},value:rm.notlar||"",onChange:e=>upd(i,"notlar",e.target.value),placeholder:"Not (opsiyonel)"})
      ))),
      h("button",{className:"rm-add",onClick:add},"+ Rakip Mağaza Ekle")
    );
  }

  function GorselUploader({urunId,gorseller,onRefresh}){
    const [drag,setDrag]=useState(false);const [uploading,setUploading]=useState(false);const [lb,setLb]=useState(null);const ref=useRef();
    async function upload(files){if(!files?.length)return;setUploading(true);const fd=new FormData();Array.from(files).forEach(f=>fd.append("gorseller",f));await fetch(`/api/urunler/${urunId}/gorseller`,{method:"POST",body:fd});setUploading(false);onRefresh();}
    async function delG(gid,e){e.stopPropagation();if(!confirm("Görsel silinsin mi?"))return;await api.del(`/api/gorseller/${gid}`);onRefresh();}
    return h("div",null,
      h("div",{className:"dtit",style:{marginTop:12}},"📸 Analiz Görselleri"),
      gorseller?.length>0&&h("div",{className:"gallery-grid"},...gorseller.map(g=>h("div",{key:g.id,className:"gthumb",onClick:()=>setLb("/uploads/"+g.dosya_adi)},h("img",{src:"/uploads/"+g.dosya_adi,alt:"",loading:"lazy"}),h("button",{className:"gthumb-del",onClick:e=>delG(g.id,e)},"✕")))),
      h("div",{className:"upload-zone"+(drag?" drag":""),onDragOver:e=>{e.preventDefault();setDrag(true)},onDragLeave:()=>setDrag(false),onDrop:e=>{e.preventDefault();setDrag(false);upload(e.dataTransfer.files)},onClick:()=>ref.current.click()},
        h("input",{ref,type:"file",accept:"image/*",multiple:true,onChange:e=>upload(e.target.files)}),
        h("div",{className:"upload-text"},uploading?"Yükleniyor...":h("span",null,"📎 SimilarWeb / analiz görseli yükle"))
      ),
      lb&&h("div",{className:"lb",onClick:()=>setLb(null)},h("img",{src:lb,alt:""}))
    );
  }

  function AiAnaliz({u,onUpdate}){
    const [loading,setLoading]=useState(false);const [error,setError]=useState("");
    async function generate(){setLoading(true);setError("");try{const r=await fetch(`/api/urunler/${u.id}/analiz`,{method:"POST"});const d=await r.json();if(d.error)setError(d.error);else onUpdate();}catch(e){setError("Bağlantı hatası: "+e.message);}setLoading(false);}
    return h("div",{className:"ai-section"},
      h("div",{className:"ai-header"},
        h("div",{className:"ai-title"},"✦ EGEMEN AI Ne Diyor?"),
        h("div",{style:{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}},
          u.ai_tarih&&h("span",{className:"ai-date"},"Son: "+ago(u.ai_tarih)),
          loading?h("div",{className:"btn btn-ai btn-s",style:{cursor:"default"}},"Analiz yapılıyor..."):h("button",{className:"btn btn-ai btn-s",onClick:generate},u.ai_analiz?"🔄 Yeniden":"✦ Analiz Oluştur")
        )
      ),
      error&&h("div",{className:"ai-error",style:{color:"var(--red)",fontSize:"var(--fs-sm)",background:"var(--red-b)",borderRadius:"var(--r)",padding:"10px 14px",marginBottom:10}},"⚠ "+error),
      loading&&h("div",{className:"ai-loading"},h("div",{className:"ai-spinner"}),h("span",null,"Claude analiz yapıyor...")),
      !loading&&!u.ai_analiz&&!error&&h("div",{className:"ai-empty"},h("div",{style:{fontSize:28}},"✦"),h("p",null,"Analiz oluşturmak için butona tıkla.")),
      !loading&&u.ai_analiz&&h("div",{className:"ai-box"},u.ai_analiz)
    );
  }

  // SW yardımcıları
  function normDomain(url){if(!url)return"";return url.replace(/^https?:\/\//i,"").replace(/\/+$/,"").toLowerCase().trim();}
  function fmtNum(n){if(!n&&n!==0)return"—";if(n>=1e6)return(n/1e6).toFixed(1)+"M";if(n>=1e3)return(n/1e3).toFixed(1)+"K";return n.toLocaleString("tr-TR");}
  function fmtPct(v){if(v==null)return"—";return(v*100).toFixed(1)+"%";}
  function fmtTime(s){if(!s)return"—";return Math.floor(s/60)+"d "+Math.floor(s%60)+"s";}

  function calcSwScore(swMap){
    // swMap: {domain: apiResponse}
    const entries=Object.values(swMap).filter(d=>d&&d.traffic&&!d.error);
    if(!entries.length)return null;
    const scores=entries.map(data=>{
      let s=0;const t=data.traffic;
      const visits=Object.values(t?.Visits||{});
      const avg=visits.length?visits.reduce((a,b)=>a+b,0)/visits.length:0;
      if(avg>100000)s+=30;else if(avg>50000)s+=20;else if(avg>10000)s+=15;else if(avg>1000)s+=5;
      const br=t?.Engagement?.BounceRate;
      if(br!=null){if(br<0.4)s+=20;else if(br<0.55)s+=12;else if(br<0.7)s+=5;}
      const org=t?.Sources?.Search||0;
      if(org>0.5)s+=20;else if(org>0.3)s+=12;else if(org>0.1)s+=5;
      const rank=data.rank?.GlobalRank;
      if(rank){if(rank<100000)s+=20;else if(rank<500000)s+=12;else if(rank<2000000)s+=6;}
      const sorted=Object.entries(t?.Visits||{}).sort((a,b)=>a[0].localeCompare(b[0]));
      if(sorted.length>=2&&sorted[sorted.length-1][1]>sorted[0][1])s+=10;
      return Math.min(100,s);
    });
    return Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);
  }

  function swScoreClr(s){return s>=70?"var(--grn)":s>=40?"var(--amb)":"var(--red)";}

  function CompChipSw({rm, swD}){
    let ul=[];try{const p=JSON.parse(rm.ulkeler||"[]");ul=Array.isArray(p)?p:[];}catch(e){}
    const fv=rm.url?getFav(rm.url):null;
    const dm=rm.url?getDom(rm.url):rm.url;
    const href=rm.url?(rm.url.startsWith("http")?rm.url:"https://"+rm.url):"#";
    const t=swD?.traffic;
    const visits=t?.Visits?Object.values(t.Visits):[];
    const avgV=visits.length?visits.reduce((a,b)=>a+b,0)/visits.length:0;
    return h("div",{style:{background:"var(--bg4)",border:"1px solid var(--b1)",borderRadius:8,padding:"7px 10px",marginBottom:6}},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}},
        h("a",{href,target:"_blank",rel:"noreferrer",style:{textDecoration:"none",display:"flex",alignItems:"center",gap:5,color:"var(--t1)",fontWeight:600,fontSize:13}},
          fv&&h("img",{src:fv,alt:"",style:{width:14,height:14,borderRadius:2},onError:e=>{e.target.style.display="none"}}),
          h("span",null,dm||"—")
        ),
        h("a",{href:"/rakip-analizi",style:{fontSize:11,color:"var(--acc)",textDecoration:"none"}},"→ Detay")
      ),
      ul.length>0&&h("div",{className:"flag-row",style:{marginTop:4}},...ul.map(k=>{const uu=ULKELER.find(x=>x.kod===k);return uu?h("span",{key:k,className:"flag"},uu.flag+" "+uu.ad):null;})),
      // SW özet satırı
      swD==="loading"&&h("div",{style:{fontSize:11,color:"var(--t3)",marginTop:5}},"📊 SW yükleniyor..."),
      swD&&swD!=="loading"&&swD.error&&h("div",{style:{fontSize:11,color:"var(--t3)",marginTop:5}},"📊 SW veri yok"),
      swD&&swD!=="loading"&&!swD.error&&t&&h("div",{style:{display:"flex",gap:10,marginTop:5,flexWrap:"wrap"}},
        avgV>0&&h("span",{style:{fontSize:11,color:"var(--cyn)"}},"👥 "+fmtNum(Math.round(avgV))+"/ay"),
        t.Engagement?.BounceRate!=null&&h("span",{style:{fontSize:11,color:t.Engagement.BounceRate<0.5?"var(--grn)":"var(--amb)"}},"↩ "+fmtPct(t.Engagement.BounceRate)),
        swD.rank?.GlobalRank&&h("span",{style:{fontSize:11,color:"var(--pur)"}},"#"+fmtNum(swD.rank.GlobalRank))
      ),
      rm.notlar&&h("div",{style:{fontSize:11,color:"var(--t3)",marginTop:3}},rm.notlar)
    );
  }

  function PRow({u,onEdit,onDel,onRefresh}){
    const [open,setOpen]=useState(false);
    const [uData,setUData]=useState(u);
    const [swMap,setSwMap]=useState({}); // {domain: data|"loading"|"error"}

    const score=calcScore(uData);
    const swScore=calcSwScore(swMap);
    const fav=uData.link?getFav(uData.link):null;
    const durClr=DURUM_CLR[uData.durum]||"var(--t3)";
    const rms=Array.isArray(uData.rakip_magazalar)?uData.rakip_magazalar:[];

    // Detay açılınca rakiplerin SW verisini önbellekten çek
    useEffect(()=>{
      if(!open||!rms.length)return;
      rms.forEach(rm=>{
        if(!rm.url)return;
        const domain=normDomain(rm.url);
        if(!domain||swMap[domain]!==undefined)return;
        setSwMap(p=>({...p,[domain]:"loading"}));
        api.get("/api/similarweb/"+encodeURIComponent(domain))
          .then(d=>setSwMap(p=>({...p,[domain]:d.error?"error":d})))
          .catch(()=>setSwMap(p=>({...p,[domain]:"error"})));
      });
    },[open]);

    async function refreshThis(){const fresh=await api.get("/api/urunler");const f=fresh.find(x=>x.id===u.id);if(f)setUData(f);onRefresh();}
    const thumb=uData.gorsel?h("img",{src:uData.gorsel,alt:"",onError:e=>{e.target.style.display="none"}}):fav?h("img",{src:fav,alt:"",style:{width:22,height:22,borderRadius:3},onError:e=>{e.target.style.display="none"}}):h("span",null,uData.nis==="Sağlık"?"💊":uData.nis==="Mutfak"?"🍳":uData.nis==="Güzellik"?"💄":uData.nis==="Bebek & Anne"?"👶":uData.nis==="Araba & Motor"?"🚗":"📦");
    const fiyatG=uData.satis_fiyat?`${uData.satis_fiyat} ${uData.para_birimi||"USD"}`:null;

    return h("div",{className:"prow"},
      h("div",{className:"mrow"+(open?" open":""),onClick:()=>setOpen(p=>!p)},
        h("button",{className:"xbtn2"+(open?" open":""),onClick:e=>{e.stopPropagation();setOpen(p=>!p)}},"▾"),
        h("div",{className:"pimg"},thumb),
        h("div",{className:"pname"},
          h("div",{className:"pname-t"},uData.urun||"—"),
          h("div",{className:"pname-s"},
            uData.durum&&h("span",{style:{display:"flex",alignItems:"center",gap:4}},h("span",{className:"sdot",style:{background:durClr}}),uData.durum),
            fiyatG&&h("span",{style:{color:"var(--grn)",fontWeight:600}},fiyatG),
            uData.kaynak&&h("span",{style:{color:"var(--t3)"}},"· "+uData.kaynak)
          )
        ),
        h("div",{className:"cc"},h("span",{style:{fontSize:12,color:"var(--t2)",textAlign:"center"}},uData.nis||"—")),
        h("div",{className:"cc"},bdg(uData.tip,true)),
        h("div",{style:{display:"flex",flexDirection:"column",gap:3,alignItems:"center"}},bdg(uData.fomo,true),bdg(uData.rakip,true)),
        h("div",{className:"cc"},bdg(uData.breakeven,true)),
        h("div",{className:"cc"},bdg(uData.fiyat,true)),
        // İki puan yan yana
        h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:3}},
          h("div",{style:{display:"flex",gap:6,alignItems:"flex-end"}},
            h("div",{style:{textAlign:"center"}},
              h("div",{className:"scnum",style:{color:scoreClr(score),fontSize:15}},score),
              h("div",{className:"sclbl"},"ürün")
            ),
            swScore!==null&&h("div",{style:{textAlign:"center"}},
              h("div",{className:"scnum",style:{color:swScoreClr(swScore),fontSize:13}},swScore),
              h("div",{className:"sclbl",style:{color:"var(--cyn)"}},"SW")
            )
          ),
          swScore!==null&&h("div",{style:{fontSize:9,color:"var(--t3)",textAlign:"center"}},
            "toplam "+(Math.round((score+swScore)/2))
          )
        )
      ),
      open&&h("div",{className:"detail"},h("div",{className:"detail-grid"},
        /* COL 1: Analiz */
        h("div",{className:"ds"},
          h("div",{className:"dtit"},"📊 Analiz"),
          h("div",{className:"drow"},h("span",{className:"dk"},"FOMO"),bdg(uData.fomo)),
          h("div",{className:"drow"},h("span",{className:"dk"},"Rakip Süre"),bdg(uData.rakip)),
          h("div",{className:"drow"},h("span",{className:"dk"},"Kreatif"),bdg(uData.kreatif)),
          h("div",{className:"drow"},h("span",{className:"dk"},"1:6 Breakeven"),bdg(uData.breakeven)),
          uData.satis_fiyat&&h("div",{className:"drow"},h("span",{className:"dk"},"Satış"),h("span",{className:"dv",style:{color:"var(--grn)",fontWeight:600}},uData.satis_fiyat+" "+(uData.para_birimi||"USD"))),
          uData.alis_fiyat&&h("div",{className:"drow"},h("span",{className:"dk"},"Alış"),h("span",{className:"dv"},uData.alis_fiyat+" "+(uData.para_birimi||"USD"))),
          h("div",{style:{marginTop:8}}),
          h("div",{className:"dk",style:{marginBottom:5}},"Ürün Puanı"),
          h("div",{style:{display:"flex",alignItems:"center",gap:9}},
            h("div",{className:"sbar-wrap"},h("div",{className:"sbar",style:{width:score+"%",background:scoreClr(score)}})),
            h("span",{style:{fontSize:13,fontWeight:700,color:scoreClr(score),minWidth:32}},score+"/100")
          ),
          swScore!==null&&h("div",null,
            h("div",{className:"dk",style:{marginBottom:5,marginTop:8}},"SW Rakip Puanı"),
            h("div",{style:{display:"flex",alignItems:"center",gap:9}},
              h("div",{className:"sbar-wrap"},h("div",{className:"sbar",style:{width:swScore+"%",background:swScoreClr(swScore)}})),
              h("span",{style:{fontSize:13,fontWeight:700,color:swScoreClr(swScore),minWidth:32}},swScore+"/100")
            ),
            h("div",{className:"dk",style:{marginBottom:5,marginTop:8}},"Toplam Ortalama"),
            h("div",{style:{display:"flex",alignItems:"center",gap:9}},
              h("div",{className:"sbar-wrap"},h("div",{className:"sbar",style:{width:Math.round((score+swScore)/2)+"%",background:scoreClr(Math.round((score+swScore)/2))}})),
              h("span",{style:{fontSize:13,fontWeight:700,color:scoreClr(Math.round((score+swScore)/2)),minWidth:32}},Math.round((score+swScore)/2)+"/100")
            )
          ),
          h("div",{style:{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}},
            uData.link&&h("a",{href:uData.link,target:"_blank",rel:"noreferrer",className:"btn btn-g btn-s",style:{textDecoration:"none",fontSize:12}},"→ Reklam"),
            uData.tedarik_link&&h("a",{href:uData.tedarik_link.startsWith("http")?uData.tedarik_link:"https://"+uData.tedarik_link,target:"_blank",rel:"noreferrer",className:"btn btn-cyn btn-s",style:{textDecoration:"none",fontSize:12}},"🛒 Tedarikçi")
          )
        ),
        /* COL 2: Rakip Mağazalar + SW mini */
        h("div",{className:"ds"},
          h("div",{className:"dtit"},"🏪 Rakip Mağazalar"),
          rms.length===0
            ?h("span",{style:{fontSize:13,color:"var(--t3)"}},"Rakip eklenmedi")
            :h("div",null,...rms.map((rm,i)=>
                h(CompChipSw,{key:i,rm,swD:swMap[normDomain(rm.url)]})
              )),
          h("div",{className:"dtit",style:{marginTop:12}},"📝 Notlar"),
          uData.notlar?h("div",{className:"note-box"},uData.notlar):h("span",{style:{fontSize:13,color:"var(--t3)"}},"Not eklenmedi"),
          h("div",{className:"dact"},
            h("button",{className:"btn btn-g btn-s",onClick:()=>onEdit(uData)},"✏ Düzenle"),
            h("button",{className:"btn btn-d btn-s",onClick:()=>onDel(uData.id,uData.urun)},"🗑 Sil")
          )
        ),
        /* COL 3: Görseller */
        h("div",{className:"ds"},h(GorselUploader,{urunId:uData.id,gorseller:uData.gorseller||[],onRefresh:refreshThis})),
        h(AiAnaliz,{u:uData,onUpdate:refreshThis})
      ))
    );
  }

  function Modal({urun,onClose,onSave}){
    const [f,setF]=useState(()=>urun?{...E0,...urun,rakip_magazalar:urun.rakip_magazalar||[]}:{...E0});
    const s=k=>v=>setF(p=>({...p,[k]:v}));
    const inp=(k,ph,type)=>h("input",{className:"fc",type:type||"text",value:f[k]||"",onChange:e=>s(k)(e.target.value),placeholder:ph||""});

  function App(){
    const [urunler,setUrunler]=useState([]);const [modal,setModal]=useState(null);
    const [search,setSearch]=useState("");const [fnis,setFnis]=useState("");const [ftip,setFtip]=useState("");const [fdurum,setFdurum]=useState("");const [loading,setLoading]=useState(true);

    useEffect(()=>{load();},[search,fnis,ftip,fdurum]);
    async function handleSave(f,eid){if(eid)await api.put(`/api/urunler/${eid}`,{...f,kullanici_id:user.id});else await api.post("/api/urunler",{...f,kullanici_id:user.id});showToast(eid?"Güncellendi ✓":"Kaydedildi ✓");load();}
    async function handleDel(id,ad){if(!confirm(`"${ad}" silinsin mi?`))return;await fetch(`/api/urunler/${id}`,{method:"DELETE",headers:{"Content-Type":"application/json"},body:JSON.stringify({kullanici_id:user.id})});showToast("Silindi");load();}

      ),
      h("div",{className:"tb"},
        h("div",{className:"sw"},h("span",{className:"si"},"🔍"),h("input",{className:"sinput",placeholder:"Ürün, not, niş ara...",value:search,onChange:e=>setSearch(e.target.value)})),
        h("select",{className:"fsel",value:fnis,onChange:e=>setFnis(e.target.value)},h("option",{value:""},"Tüm Nişler"),...NISLER.map(n=>h("option",{key:n,value:n},n))),
        h("select",{className:"fsel",value:ftip,onChange:e=>setFtip(e.target.value)},h("option",{value:""},"Tüm Tipler"),...TIPLER.map(t=>h("option",{key:t,value:t},t))),

      ),

      urunler.length===0?h("div",{className:"empty"},h("div",{className:"empty-ico"},"🔍"),h("h3",null,"Henüz ürün yok"),h("p",null,"+ Ekle butonuna tıkla")):

        h("div",{className:"plist"},...urunler.map(u=>h(PRow,{key:u.id,u,onEdit:u2=>setModal(u2),onDel:handleDel,onRefresh:load})))
      ),

    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
}
