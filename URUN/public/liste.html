        h("select",{className:"fsel",value:ftip,onChange:e=>setFtip(e.target.value)},h("option",{value:""},"Tüm Tipler"),...TIPLER.map(t=>h("option",{key:t,value:t},t))),
        h("select",{className:"fsel",value:fdurum,onChange:e=>setFdurum(e.target.value)},h("option",{value:""},"Tüm Durumlar"),...DURUM_O.map(d=>h("option",{key:d,value:d},d)))
      ),
      loading?h("div",{style:{textAlign:"center",padding:"4rem",color:"var(--t3)"}},"Yükleniyor..."):
      urunler.length===0?h("div",{className:"empty"},h("div",{className:"empty-ico"},"🔍"),h("h3",null,"Henüz ürün yok"),h("p",null,"+ Ekle butonuna tıkla")):
      h("div",null,
        h("div",{style:{fontSize:12,color:"var(--t3)",marginBottom:8}},"▾ simgesine tıkla → detay, rakipler, görsel yükleme ve AI analiz"),
        h("div",{className:"plist"},...urunler.map(u=>h(PRow,{key:u.id,u,onEdit:u2=>setModal(u2),onDel:handleDel,onRefresh:load})))
      ),
      (modal==="ekle"||modal?.id)&&h(Modal,{urun:modal==="ekle"?null:modal,onClose:()=>setModal(null),onSave:handleSave})
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
}
