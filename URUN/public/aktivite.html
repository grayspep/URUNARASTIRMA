<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>XCOMMERCE — Aktivite</title>
<link rel="stylesheet" href="/main.css"/>
</head>
<body>
<button class="hamburger" id="ham">☰</button>
<div class="app">
  <div id="nav-root"></div>
  <main class="main" id="root"></main>
</div>
<script src="/nav.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const user = requireAuth();
if (user) {
  renderSidebar();
  const {useState,useEffect} = React, h = React.createElement;

  function App(){
    const [st,setSt]=useState(null);
    useEffect(()=>{api.get("/api/stats").then(setSt);},[]);
    if(!st) return h("div",{style:{textAlign:"center",padding:"4rem",color:"var(--t3)"}},"Yükleniyor...");
    const akt=st.son_aktivite||[];
    return h("div",null,
      h("div",{className:"ph"},h("div",null,h("div",{className:"ptit"},"Son Aktiviteler"),h("div",{className:"psub"},akt.length+" kayıt"))),
      akt.length===0
        ?h("div",{className:"empty"},h("div",{className:"empty-ico"},"📝"),h("h3",null,"Henüz aktivite yok"))
        :h("div",{className:"ccard",style:{background:"var(--bg2)",border:"1px solid var(--b1)",borderRadius:"var(--rl)",padding:"0.5rem 1.4rem"}},
          h("div",{style:{display:"flex",flexDirection:"column"}},
            ...akt.map((a,i)=>h("div",{key:i,style:{display:"flex",alignItems:"center",gap:14,padding:"13px 0",borderBottom:i<akt.length-1?"1px solid var(--b1)":"none",fontSize:"var(--fs-sm)"}},
              h("div",{style:{width:10,height:10,borderRadius:"50%",background:a.renk||"#4f7cff",flexShrink:0}}),
              h("div",{style:{flex:1,color:"var(--t2)"}},h("strong",{style:{color:"var(--t1)"}},(a.isim||"Kullanıcı"))," ",a.eylem,": ",a.urun_adi||"—"),
              h("div",{style:{color:"var(--t3)",fontSize:12,whiteSpace:"nowrap"}},ago(a.zaman))
            ))
          )
        )
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
}
</script>
</body>
</html>
