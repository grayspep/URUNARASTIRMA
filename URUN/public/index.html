<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ürün Araştırma</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f12;--bg2:#161920;--bg3:#1e222b;--bg4:#252a35;--bg5:#2d3344;
  --b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);--b3:rgba(255,255,255,0.22);
  --t1:#eef0f4;--t2:#8b92a0;--t3:#4e5564;
  --acc:#4f7cff;--acc-d:rgba(79,124,255,0.12);
  --grn:#22c55e;--grn-b:rgba(34,197,94,0.1);
  --red:#f05252;--red-b:rgba(240,82,82,0.1);
  --amb:#f59e0b;--amb-b:rgba(245,158,11,0.1);
  --pur:#a78bfa;--pur-b:rgba(167,139,250,0.1);
  --cyn:#22d3ee;--cyn-b:rgba(34,211,238,0.1);
  --r:8px;--rl:12px;--rxl:16px;
  --fs-base:15px;--fs-sm:13px;--fs-xs:11px;--fs-lg:17px;--fs-xl:22px;
}
body{background:var(--bg);color:var(--t1);font-family:system-ui,-apple-system,sans-serif;font-size:var(--fs-base);line-height:1.6;-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

/* ── SIDEBAR ── */
.sb{background:var(--bg2);border-right:1px solid var(--b1);padding:1.5rem 1rem;display:flex;flex-direction:column;gap:3px;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:100}
.logo{padding:.5rem .75rem 1.5rem}
.logo-top{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.logo-main{font-size:19px;font-weight:700;color:var(--t1);letter-spacing:-.5px;margin-top:3px}
.logo-main span{color:var(--acc)}
.nsep{font-size:10px;color:var(--t3);font-weight:700;padding:1rem .75rem .3rem;letter-spacing:1.2px;text-transform:uppercase}
.ni{display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:var(--fs-sm);font-weight:500;transition:all .13s;border:none;background:none;width:100%;text-align:left}
.ni:hover{background:var(--bg3);color:var(--t1)}
.ni.on{background:var(--acc-d);color:var(--acc);font-weight:600}
.ni-ic{font-size:15px;width:22px;text-align:center}
.ni-b{margin-left:auto;background:var(--bg4);color:var(--t3);font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.sbfoot{margin-top:auto;padding-top:1rem;border-top:1px solid var(--b1)}
.ulbl{font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;padding:0 4px}
.usel{width:100%;background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:9px 11px;color:var(--t1);font-size:var(--fs-sm);cursor:pointer;font-family:inherit}
.usel:focus{outline:2px solid var(--acc);border-color:transparent}

/* ── HAMBURGER ── */
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:200;background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:8px 10px;cursor:pointer;color:var(--t1);font-size:18px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}

/* ── MAIN ── */
.main{padding:2rem 2.5rem;overflow-x:hidden;min-width:0}

/* ── PAGE HEADER ── */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.75rem;gap:1rem;flex-wrap:wrap}
.ptit{font-size:var(--fs-xl);font-weight:700;letter-spacing:-.5px}
.psub{font-size:var(--fs-sm);color:var(--t2);margin-top:4px}
.pact{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:1.75rem}
.sc{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rl);padding:1.1rem 1.25rem;transition:border-color .15s;cursor:default}
.sc:hover{border-color:var(--b2)}
.slbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:9px}
.sval{font-size:30px;font-weight:700;letter-spacing:-1.5px;line-height:1}
.ssub{font-size:var(--fs-xs);color:var(--t3);margin-top:6px}
.sc.ac .sval{color:var(--acc)}.sc.gr .sval{color:var(--grn)}.sc.am .sval{color:var(--amb)}

/* ── TOOLBAR ── */
.tb{display:flex;gap:8px;margin-bottom:1.1rem;flex-wrap:wrap}
.sw{flex:1;min-width:160px;position:relative}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
.sinput{width:100%;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:9px 13px 9px 32px;color:var(--t1);font-size:var(--fs-sm);font-family:inherit;transition:border-color .15s}
.sinput:focus{outline:none;border-color:var(--acc);background:var(--bg3)}
.sinput::placeholder{color:var(--t3)}
.fsel{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:9px 11px;color:var(--t1);font-size:var(--fs-sm);font-family:inherit;cursor:pointer}
.fsel:focus{outline:none;border-color:var(--acc)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r);font-size:var(--fs-sm);font-family:inherit;font-weight:600;cursor:pointer;border:none;transition:all .13s;white-space:nowrap;text-decoration:none}
.btn-p{background:var(--acc);color:#fff}.btn-p:hover{background:#6b92ff}
.btn-g{background:transparent;border:1px solid var(--b2);color:var(--t2)}.btn-g:hover{background:var(--bg3);color:var(--t1)}
.btn-d{background:transparent;border:1px solid rgba(240,82,82,.25);color:var(--red)}.btn-d:hover{background:var(--red-b)}
.btn-ai{background:linear-gradient(135deg,#4f7cff,#a78bfa);color:#fff;font-weight:700}.btn-ai:hover{opacity:.9}
.btn-s{padding:5px 11px;font-size:12px}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:12px;font-weight:600;white-space:nowrap}
.bg{background:var(--grn-b);color:var(--grn)}.br{background:var(--red-b);color:var(--red)}
.ba{background:var(--amb-b);color:var(--amb)}.bp{background:var(--pur-b);color:var(--pur)}
.bc{background:var(--cyn-b);color:var(--cyn)}.bn{background:var(--bg4);color:var(--t2)}

/* ── PRODUCT LIST ── */
.plist{display:flex;flex-direction:column;background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden}
.prow{border-bottom:1px solid var(--b1)}.prow:last-child{border-bottom:none}
.mrow{display:grid;grid-template-columns:28px 40px 1fr 90px 95px 95px 75px 75px 58px;align-items:center;gap:8px;padding:11px 16px;cursor:pointer;transition:background .1s;min-width:0}
.mrow:hover,.mrow.open{background:var(--bg3)}
.xbtn2{width:24px;height:24px;border-radius:6px;border:none;background:var(--bg4);color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;flex-shrink:0}
.xbtn2.open{background:var(--acc-d);color:var(--acc);transform:rotate(180deg)}
.pimg{width:36px;height:36px;border-radius:7px;background:var(--bg4);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0}
.pimg img{width:100%;height:100%;object-fit:cover}
.pname{min-width:0}
.pname-t{font-weight:600;font-size:var(--fs-sm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pname-s{font-size:12px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;display:flex;align-items:center;gap:6px}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.cc{display:flex;justify-content:center}
.scnum{font-size:16px;font-weight:700;line-height:1}
.sclbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)}

/* ── DETAIL ── */
.detail{background:var(--bg3);border-top:1px solid var(--b1);padding:1.5rem 1.75rem}
.detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.5rem}
.ds{display:flex;flex-direction:column;gap:9px}
.dtit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--t3);margin-bottom:6px}
.drow{display:flex;justify-content:space-between;align-items:center;gap:8px}
.dk{font-size:var(--fs-sm);color:var(--t2);flex-shrink:0}
.dv{font-size:var(--fs-sm);color:var(--t1);text-align:right}
.note-box{font-size:var(--fs-sm);color:var(--t2);line-height:1.7;background:var(--bg4);border-radius:var(--r);padding:10px 12px;border-left:2px solid var(--acc)}
.sbar-wrap{background:var(--bg4);border-radius:4px;height:7px;overflow:hidden;flex:1}
.sbar{height:100%;border-radius:4px;transition:width .6s}
.comp-chip{display:inline-flex;flex-direction:column;background:var(--bg4);border:1px solid var(--b1);border-radius:7px;padding:5px 9px;font-size:12px;color:var(--t2);margin:3px;text-decoration:none;transition:border-color .13s}
.comp-chip:hover{border-color:var(--b2);color:var(--t1)}
.comp-top{display:flex;align-items:center;gap:5px;font-weight:600;color:var(--t1)}
.comp-top img{width:13px;height:13px;border-radius:2px}
.flag-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.flag{font-size:11px;background:var(--bg5);padding:2px 6px;border-radius:3px;color:var(--t2)}
.dact{display:flex;gap:7px;margin-top:10px;flex-wrap:wrap}

/* ── AI ANALİZ ── */
.ai-section{grid-column:1/-1;margin-top:4px;border-top:1px solid var(--b1);padding-top:1.25rem}
.ai-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.ai-title{font-size:var(--fs-lg);font-weight:700;background:linear-gradient(135deg,#4f7cff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ai-date{font-size:12px;color:var(--t3)}
.ai-box{background:var(--bg4);border:1px solid var(--b2);border-radius:var(--rl);padding:1.25rem 1.5rem;font-size:var(--fs-sm);line-height:1.8;color:var(--t1);white-space:pre-wrap;word-break:break-word}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--t2);font-size:var(--fs-sm);padding:1.5rem 0}
.ai-spinner{width:18px;height:18px;border:2px solid var(--b2);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ai-error{color:var(--red);font-size:var(--fs-sm);background:var(--red-b);border-radius:var(--r);padding:10px 14px}
.ai-empty{text-align:center;padding:2rem;color:var(--t3)}
.ai-empty p{font-size:var(--fs-sm);margin-top:8px}

/* ── GALLERY ── */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(75px,1fr));gap:8px;margin-top:8px}
.gthumb{position:relative;border-radius:var(--r);overflow:hidden;aspect-ratio:1;background:var(--bg4);cursor:pointer;border:1px solid var(--b1);transition:border-color .15s}
.gthumb:hover{border-color:var(--b2)}
.gthumb img{width:100%;height:100%;object-fit:cover}
.gthumb-del{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.75);border:none;color:#fff;width:20px;height:20px;border-radius:4px;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center}
.gthumb:hover .gthumb-del{display:flex}
.upload-zone{border:2px dashed var(--b2);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:all .2s;margin-top:8px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--acc);background:var(--acc-d)}
.upload-zone input{display:none}
.upload-text{font-size:12px;color:var(--t3)}.upload-text span{color:var(--acc)}
.lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lb img{max-width:90vw;max-height:90vh;border-radius:var(--r);object-fit:contain}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:300;padding:1rem}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--rxl);width:100%;max-width:800px;max-height:92vh;overflow-y:auto}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:1.35rem 1.6rem;border-bottom:1px solid var(--b1)}
.mtit{font-size:var(--fs-lg);font-weight:700}
.mbdy{padding:1.6rem}
.mfoot{padding:1.1rem 1.6rem;border-top:1px solid var(--b1);display:flex;gap:8px;justify-content:flex-end}
.xbtn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:24px;line-height:1;padding:2px 8px;border-radius:6px}
.xbtn:hover{background:var(--bg4);color:var(--t1)}
.fsect{margin-bottom:1.35rem}
.fsect-t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--t3);margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--b1)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px}
.fc{width:100%;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);padding:9px 12px;color:var(--t1);font-size:var(--fs-sm);font-family:inherit;transition:border-color .15s}
.fc:focus{outline:none;border-color:var(--acc);background:var(--bg4)}
.fc::placeholder{color:var(--t3)}
textarea.fc{resize:vertical;min-height:78px}
select.fc{cursor:pointer}
.fhint{font-size:11px;color:var(--t3);margin-top:3px}

/* ── RAKIP EDİTÖR ── */
.rm-list{display:flex;flex-direction:column;gap:9px;margin-top:9px}
.rm-item{background:var(--bg4);border:1px solid var(--b1);border-radius:var(--r);padding:11px 13px}
.rm-row1{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-bottom:9px}
.rm-flags{display:flex;flex-wrap:wrap;gap:5px}
.rm-flag-cb{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t2);cursor:pointer;padding:3px 7px;border-radius:4px;background:var(--bg3);border:1px solid var(--b1);transition:all .13s;user-select:none}
.rm-flag-cb:hover{border-color:var(--b2)}
.rm-flag-cb.sel{background:var(--acc-d);border-color:var(--acc);color:var(--t1)}
.rm-flag-cb input{display:none}
.rm-add{display:flex;align-items:center;gap:6px;font-size:var(--fs-sm);color:var(--acc);cursor:pointer;padding:7px 0;background:none;border:none;font-family:inherit;font-weight:600}
.rm-add:hover{opacity:.8}

/* ── CHARTS ── */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ccard{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rl);padding:1.35rem}
.cctit{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:1.1rem}
.brow{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.blbl{font-size:var(--fs-sm);color:var(--t2);width:135px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.btrk{flex:1;background:var(--bg3);border-radius:4px;height:8px;overflow:hidden}
.bfil{height:100%;border-radius:4px;background:var(--acc);transition:width .6s}
.bcnt{font-size:var(--fs-sm);color:var(--t3);width:24px;text-align:right;flex-shrink:0}

/* ── MISC ── */
.empty{text-align:center;padding:5rem 2rem;color:var(--t3)}
.empty-ico{font-size:40px;margin-bottom:1rem;opacity:.5}
.empty h3{font-size:var(--fs-lg);color:var(--t2);font-weight:600;margin-bottom:7px}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);padding:11px 18px;font-size:var(--fs-sm);color:var(--t1);z-index:999;display:flex;align-items:center;gap:9px;animation:su .2s ease;max-width:320px}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--grn);flex-shrink:0}
@keyframes su{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .sg{grid-template-columns:repeat(2,1fr)}
  .detail-grid{grid-template-columns:1fr 1fr}
  .mrow{grid-template-columns:28px 36px 1fr 80px 85px 75px 65px}
  .mrow>:nth-child(9){display:none}
}
@media(max-width:768px){
  .app{grid-template-columns:1fr}
  .sb{position:fixed;left:-260px;transition:left .25s;top:0;height:100vh;width:240px;z-index:150}
  .sb.open{left:0}
  .sb-overlay.open{display:block}
  .hamburger{display:flex;align-items:center;justify-content:center}
  .main{padding:1.25rem 1rem;padding-top:3.5rem}
  .sg{grid-template-columns:1fr 1fr;gap:10px}
  .detail-grid{grid-template-columns:1fr}
  .mrow{grid-template-columns:28px 36px 1fr 70px 60px}
  .mrow>:nth-child(6),.mrow>:nth-child(7),.mrow>:nth-child(8),.mrow>:nth-child(9){display:none}
  .fgrid{grid-template-columns:1fr}
  .cg{grid-template-columns:1fr}
  .tb{flex-direction:column}
  .sw{min-width:unset}
  .pact{width:100%}
  .pact .btn{flex:1;justify-content:center}
}
@media(max-width:480px){
  .sg{grid-template-columns:1fr 1fr}
  .sval{font-size:24px}
  .ptit{font-size:19px}
  .modal{max-width:100%;border-radius:var(--rl) var(--rl) 0 0;margin-top:auto}
  .ov{align-items:flex-end;padding:0}
}
</style>
</head>
<body>
<button class="hamburger" id="ham">☰</button>
<div class="sb-overlay" id="overlay"></div>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef}=React,h=React.createElement;

// Hamburger
document.getElementById("ham").onclick=()=>{
  document.querySelector(".sb").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
};
document.getElementById("overlay").onclick=()=>{
  document.querySelector(".sb").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
};

/* ── SABITLER ── */
const NISLER=["Hobi","Sağlık","Bebek & Anne","Mutfak","Güzellik","Kadın","Araba & Motor","Ev & Dekor","Spor","Teknoloji","Evcil Hayvan"];
const TIPLER=["Sorun Çözen","Wow Ürün + Hediyelik"];
const FOMO_O=["Evet","Hayır","Bilinmiyor"];
const RAKIP_O=["1 Aydan Kısa","3 Aydan Kısa","6 Aydan Uzun"];
const KREATIF_O=["Video ve Görsel Kreatif Var","Sadece Görsel Kreatif Var"];
const BE_O=["Evet","Hayır","Bilinmiyor"];
const FIYAT_O=["1200'den Az","2000'den Az","2000'den Fazla","3750'den Fazla"];
const DURUM_O=["Araştırılıyor","Test Aşamasında","Onaylandı","Reddedildi"];
const KAYNAK_O=["AliExpress","CJDropshipping","Zendrop","Spocket","Alibaba","Diğer"];
const DURUM_CLR={"Araştırılıyor":"var(--amb)","Test Aşamasında":"var(--acc)","Onaylandı":"var(--grn)","Reddedildi":"var(--red)"};
const ULKELER=[
  {kod:"TR",ad:"Türkiye",flag:"🇹🇷"},{kod:"CH",ad:"İsviçre",flag:"🇨🇭"},{kod:"PL",ad:"Polonya",flag:"🇵🇱"},
  {kod:"DE",ad:"Almanya",flag:"🇩🇪"},{kod:"FR",ad:"Fransa",flag:"🇫🇷"},{kod:"GB",ad:"İngiltere",flag:"🇬🇧"},
  {kod:"US",ad:"Amerika",flag:"🇺🇸"},{kod:"AU",ad:"Avustralya",flag:"🇦🇺"},{kod:"CA",ad:"Kanada",flag:"🇨🇦"},

  get:  u=>fetch(u).then(r=>r.json()),
  post: (u,d)=>fetch(u,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).then(r=>r.json()),
  put:  (u,d)=>fetch(u,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(d)}).then(r=>r.json()),

function calcScore(u){
  let s=0;
  if(u.fomo==="Evet")s+=25;if(u.breakeven==="Evet")s+=25;
  if(u.kreatif==="Video ve Görsel Kreatif Var")s+=20;
  if(u.rakip==="1 Aydan Kısa")s+=30;else if(u.rakip==="3 Aydan Kısa")s+=15;
  return s;
}
function scoreClr(s){return s>=70?"var(--grn)":s>=40?"var(--amb)":"var(--red)";}
function getFav(url){try{return`https://www.google.com/s2/favicons?domain=${new URL(url.startsWith("http")?url:"https://"+url).hostname}&sz=32`}catch{return null}}
function getDom(url){try{return new URL(url.startsWith("http")?url:"https://"+url).hostname.replace("www.","")}catch{return url}}
function ago(dt){const s=Math.floor((Date.now()-new Date(dt+"Z"))/1000);if(s<120)return"az önce";if(s<3600)return Math.floor(s/60)+" dk";if(s<86400)return Math.floor(s/3600)+" sa";return Math.floor(s/86400)+" gün önce";}

function bdg(val,sm){
  if(!val)return h("span",{style:{color:"var(--t3)",fontSize:11}},"—");
  const g=["Evet","1 Aydan Kısa","3 Aydan Kısa","Video ve Görsel Kreatif Var","2000'den Fazla","3750'den Fazla","Sorun Çözen","Onaylandı"];
  const r=["6 Aydan Uzun","Hayır","1200'den Az","Reddedildi"];
  const a=["Bilinmiyor","Sadece Görsel Kreatif Var","2000'den Az","Araştırılıyor"];
  const p=["Wow Ürün + Hediyelik"];const c=["Test Aşamasında"];
  const cls=g.includes(val)?"bg":r.includes(val)?"br":a.includes(val)?"ba":p.includes(val)?"bp":c.includes(val)?"bc":"bn";
  return h("span",{className:"bdg "+cls,style:sm?{fontSize:11,padding:"2px 6px"}:{}},val);
}

/* ── GÖRSEL YÜKLEYİCİ ── */
function GorselUploader({urunId,gorseller,onRefresh}){
  const [drag,setDrag]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [lb,setLb]=useState(null);
  const ref=useRef();
  async function upload(files){
    if(!files?.length)return;
    setUploading(true);
    const fd=new FormData();
    Array.from(files).forEach(f=>fd.append("gorseller",f));
    await fetch(`/api/urunler/${urunId}/gorseller`,{method:"POST",body:fd});
    setUploading(false);onRefresh();
  }
  async function delG(gid,e){
    e.stopPropagation();
    if(!confirm("Bu görsel silinsin mi?"))return;
    await api.del(`/api/gorseller/${gid}`);onRefresh();
  }
  return h("div",null,
    h("div",{className:"dtit",style:{marginTop:12}},"📸 Analiz Görselleri"),
    gorseller?.length>0&&h("div",{className:"gallery-grid"},
      ...gorseller.map(g=>h("div",{key:g.id,className:"gthumb",onClick:()=>setLb("/uploads/"+g.dosya_adi)},
        h("img",{src:"/uploads/"+g.dosya_adi,alt:"",loading:"lazy"}),
        h("button",{className:"gthumb-del",onClick:e=>delG(g.id,e)},"✕")
      ))
    ),
    h("div",{className:"upload-zone"+(drag?" drag":""),
      onDragOver:e=>{e.preventDefault();setDrag(true)},
      onDragLeave:()=>setDrag(false),
      onDrop:e=>{e.preventDefault();setDrag(false);upload(e.dataTransfer.files)},
      onClick:()=>ref.current.click()
    },
      h("input",{ref,type:"file",accept:"image/*",multiple:true,onChange:e=>upload(e.target.files)}),
      h("div",{className:"upload-text"},uploading?"Yükleniyor...":h("span",null,"📎 SimilarWeb / Analiz görseli yükle"))
    ),
    lb&&h("div",{className:"lb",onClick:()=>setLb(null)},h("img",{src:lb,alt:""}))
  );
}

    setLoading(true);setError("");
